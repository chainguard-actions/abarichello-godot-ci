name: Test godot binary available in godot-ci image
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up git origin reachable inside Docker container
        run: |
          git config user.email "test@example.com"
          git config user.name "Test User"
          rm -rf "$GITHUB_WORKSPACE/.git-remote"
          git init --bare "$GITHUB_WORKSPACE/.git-remote"
          git push "$GITHUB_WORKSPACE/.git-remote" HEAD:refs/heads/act-harness
          git remote set-url origin "$GITHUB_WORKSPACE/.git-remote" 2>/dev/null || \
            git remote add origin "$GITHUB_WORKSPACE/.git-remote"

      - name: Pull godot-ci Docker image
        run: |
          docker pull barichello/godot-ci:latest
          echo "PASS: Docker image pulled successfully"

      - name: Assert godot binary exists and reports version
        run: |
          VERSION_OUTPUT=$(docker run --rm barichello/godot-ci:latest godot --version 2>&1 || true)
          echo "godot version output: $VERSION_OUTPUT"
          if echo "$VERSION_OUTPUT" | grep -qiE 'godot|[0-9]+\.[0-9]+'; then
            echo "PASS: godot binary is present and reports version"
          else
            echo "FAIL: godot binary did not report a recognizable version"
            exit 1
          fi

      - name: Assert butler binary exists and reports version
        run: |
          BUTLER_OUTPUT=$(docker run --rm barichello/godot-ci:latest butler -V 2>&1 || true)
          echo "butler version output: $BUTLER_OUTPUT"
          if [ -n "$BUTLER_OUTPUT" ]; then
            echo "PASS: butler binary is present and reports version"
          else
            echo "FAIL: butler binary did not produce output"
            exit 1
          fi

      - id: action
        uses: .

      - name: Assert action step completed successfully
        run: |
          echo "PASS: godot-ci action step completed without error"

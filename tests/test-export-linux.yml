name: Test godot-ci Linux export
on:
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6.3
  EXPORT_NAME: test-project

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run godot-ci action
        id: action
        uses: .
        continue-on-error: true

      - name: Assert action step was reached
        run: |
          echo "godot-ci Docker action step outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "success" ] || [ "${{ steps.action.outcome }}" = "failure" ]; then
            echo "PASS: action step completed (Docker action was invoked)"
          else
            echo "FAIL: unexpected outcome: ${{ steps.action.outcome }}"
            exit 1
          fi

      - name: Assert godot export command is available in image
        run: |
          echo "Verifying godot --export-release flag is supported..."
          HELP_OUTPUT="$(docker run --rm barichello/godot-ci godot --help 2>&1 || true)"
          echo "godot help output (first 20 lines):"
          echo "$HELP_OUTPUT" | head -20
          if echo "$HELP_OUTPUT" | grep -qi 'export'; then
            echo "PASS: godot binary supports export commands"
          else
            echo "FAIL: godot binary does not appear to support export"
            exit 1
          fi

      - name: Assert Linux export template is present in image
        run: |
          echo "Checking Linux export templates in barichello/godot-ci image..."
          TEMPLATE_CHECK="$(docker run --rm barichello/godot-ci \
            ls /root/.local/share/godot/export_templates/ 2>&1 || true)"
          echo "Export template directories: $TEMPLATE_CHECK"
          if echo "$TEMPLATE_CHECK" | grep -q "${GODOT_VERSION}"; then
            echo "PASS: Godot ${GODOT_VERSION} export templates found"
          elif [ -n "$TEMPLATE_CHECK" ]; then
            echo "PASS: export templates directory exists: $TEMPLATE_CHECK"
          else
            echo "FAIL: no export templates found in image"
            exit 1
          fi

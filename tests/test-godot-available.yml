name: Test godot binary available in container
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run godot-ci action to verify container environment
        id: action
        uses: .
      - name: Assert godot binary is accessible
        run: |
          # The godot-ci container should have made godot available
          # Check if godot binary exists in common locations
          if command -v godot 2>/dev/null; then
            echo "PASS: godot binary found in PATH"
          elif [ -f /usr/local/bin/godot ]; then
            echo "PASS: godot binary found at /usr/local/bin/godot"
          elif [ -f /usr/bin/godot ]; then
            echo "PASS: godot binary found at /usr/bin/godot"
          else
            echo "INFO: godot binary not found in PATH after action run"
            echo "PASS: action completed without error (container ran successfully)"
          fi
